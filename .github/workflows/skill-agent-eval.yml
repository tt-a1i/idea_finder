name: live-skill-agent-eval

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codex-skill-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm install --global @openai/codex@0.144.1
      - run: npm run test:skill-agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
