name: optional-live-smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hn-live-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:live-smoke
