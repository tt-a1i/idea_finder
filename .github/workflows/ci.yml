name: release-gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deterministic-release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run release:gate
